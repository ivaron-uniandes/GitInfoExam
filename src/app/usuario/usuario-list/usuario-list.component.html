<div class="container-fluid py-3">
  <h2 class="mb-3" style="color: #000000; font-weight: bold; font-size: 4rem;">Explorar Usuarios</h2>
  <div class="row mb-3 align-items-center">
    <div class="col-12 col-md-8">
      <p class="mb-0" style="color: #000000;">Este es un listado de usuarios en Git.</p>
    </div>
  </div>

  <div class="directores">
    <figure class="director" *ngFor="let usuario of pagedUsuarios" [routerLink]="['/usuario/', usuario.id]" >
      <img [src]="usuario.avatarUrl" [alt]="usuario.name">
      <figcaption>{{ usuario.username }}</figcaption>
    </figure>
  </div>




  <nav class="mt-3" *ngIf="totalPages > 1" aria-label="Paginación directores">
    <ul class="pagination justify-content-center mb-0">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage - 1)">«</a>
      </li>
      <li class="page-item" *ngFor="let p of pages" [class.active]="p === currentPage">
        <a class="page-link" href="javascript:void(0)" (click)="goToPage(p)">{{ p }}</a>
      </li>
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <a class="page-link" href="javascript:void(0)" (click)="goToPage(currentPage + 1)">»</a>
      </li>
    </ul>
  </nav>

</div>
